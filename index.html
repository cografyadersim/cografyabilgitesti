<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dünya Coğrafyası Bilgi Yarışması v3 - Pro</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --light-bg: #f5f7fa;
            --accent-color: #f39c12;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
            padding: 25px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-top: 0;
            font-size: 22px;
            border-bottom: 3px solid var(--secondary-color);
            padding-bottom: 12px;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--success-color));
            transition: width 0.3s ease;
        }

        .category-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        button.btn-cat {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        button.btn-cat:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
        }

        .quiz-screen, .result-screen {
            display: none;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-color);
            background: #e8f4f8;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }

        .timer-badge {
            background-color: var(--accent-color);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 16px;
        }

        .question-box {
            font-size: 18px;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
            min-height: 50px;
        }

        .flag-display {
            font-size: 70px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            line-height: 1;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        button.option-btn {
            background-color: white;
            border: 2px solid #e0e0e0;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s;
            font-weight: 500;
            color: #333;
        }

        button.option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            background-color: #f7f9fa;
        }

        button.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        button.wrong {
            background-color: var(--danger-color) !important;
            color: white !important;
            border-color: var(--danger-color) !important;
        }

        .next-btn {
            display: none;
            width: 100%;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .result-screen {
            text-align: center;
            padding: 20px 0;
        }

        .result-score {
            font-size: 48px;
            font-weight: bold;
            color: var(--secondary-color);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="progress-bar-container" id="p-container" style="display:none;">
        <div class="progress-bar" id="bar"></div>
    </div>

    <h1 id="main-title">🌍 Coğrafya Keşif Yarışması v3</h1>
    
    <div id="category-screen">
        <p style="text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px;">Her kategoride rastgele 20 soru sorulur. Soru başına 15 saniyeniz var!</p>
        <div class="category-select">
            <button class="btn-cat" onclick="startQuiz('ulke')"><span>📍</span>Ülkeler</button>
            <button class="btn-cat" onclick="startQuiz('bayrak')"><span>🚩</span>Bayraklar</button>
            <button class="btn-cat" onclick="startQuiz('kita')"><span>🗺️</span>Kıtalar</button>

            <button class="btn-cat" onclick="startQuiz('boğaz')"><span>⚓</span>Boğaz & Kanal</button>
            <button class="btn-cat" style="grid-column: span 2;" onclick="startQuiz('akarsu')"><span>🏞️</span>Akarsular</button>
        </div>
    </div>

    <div id="quiz-screen" class="quiz-screen">
        <div class="stats">
            <span id="question-counter">Soru: 1/20</span>
            <span id="timer" class="timer-badge">15s</span>
            <span id="score-board">Puan: 0</span>
        </div>
        
        <div id="flag-space" class="flag-display"></div>
        <div id="question" class="question-box"></div>
        <div class="options-grid" id="options-container"></div>

        <button id="next-button" class="next-btn" onclick="nextQuestion()">Sonraki Soru ➡️</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h2>Yarışma Tamamlandı! 🎉</h2>
        <p id="result-category" style="font-weight: bold; color: #7f8c8d;"></p>
        <div class="result-score" id="final-score">0</div>
        <p id="result-comment" style="font-size: 16px; margin-bottom: 25px; color: var(--primary-color);"></p>
        <button class="btn-cat" style="width: 100%;" onclick="resetToMenu()">Ana Menüye Dön 🏠</button>
    </div>
</div>

let currentCategory = '';
let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let timerInterval;
let timeLeft = 15;

const catTitles = {ulke: "Ülkeler", bayrak: "Bayraklar", kita: "Kıtalar", deniz: "Denizler & Okyanuslar", dag: "Dağlar", boğaz: "Boğazlar & Kanallar", akarsu: "Akarsular"};

function startQuiz(category) {
    currentCategory = category;
    currentQuestions = [...geographyData[category]].sort(() => Math.random() - 0.5); 
    currentQuestionIndex = 0;
    score = 0;
    
    document.getElementById('category-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    document.getElementById('p-container').style.display = 'block';
    document.getElementById('main-title').style.display = 'none';
    
    showQuestion();
}

function startTimer() {
    timeLeft = 15;
    document.getElementById('timer').innerText = timeLeft + "s";
    document.getElementById('timer').style.backgroundColor = "var(--accent-color)";
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = timeLeft + "s";
        
        if (timeLeft <= 5) {
            document.getElementById('timer').style.backgroundColor = "var(--danger-color)";
        }
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timeOutHandler();
        }
    }, 1000);
}

function timeOutHandler() {
    const buttons = document.querySelectorAll('.option-btn');
    let correctOpt = currentQuestions[currentQuestionIndex].a;
    
    buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.innerText === correctOpt) btn.classList.add('correct');
    });
    
    document.getElementById('next-button').style.display = 'block';
}

function showQuestion() {
    document.getElementById('next-button').style.display = 'none';
    document.getElementById('question-counter').innerText = `Soru: ${currentQuestionIndex + 1} / 20`;
    document.getElementById('score-board').innerText = `Puan: ${score}`;
    
    let progressPercent = ((currentQuestionIndex) / 20) * 100;
    document.getElementById('bar').style.width = `${progressPercent}%`;
    
    let qData = currentQuestions[currentQuestionIndex];
    
    const flagSpace = document.getElementById('flag-space');
    if (currentCategory === 'bayrak' && qData.flag) {
        flagSpace.innerText = qData.flag;
        flagSpace.style.display = 'block';
    } else {
        flagSpace.style.display = 'none';
    }
    
    document.getElementById('question').innerText = qData.q;
    let options = [qData.a, ...qData.alt].sort(() => Math.random() - 0.5);
    
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.classList.add('option-btn');
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(btn, opt, qData.a);
        container.appendChild(btn);
    });
    
    startTimer();
}

function checkAnswer(selectedBtn, selectedOpt, correctOpt) {
    clearInterval(timerInterval);
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true); 
    
    if (selectedOpt === correctOpt) {
        selectedBtn.classList.add('correct');
        score += 5; 
    } else {
        selectedBtn.classList.add('wrong');
        buttons.forEach(btn => {
            if (btn.innerText === correctOpt) btn.classList.add('correct');
        });
    }
    
    document.getElementById('score-board').innerText = `Puan: ${score}`;
    document.getElementById('next-button').style.display = 'block';
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < 20) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    clearInterval(timerInterval);
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('p-container').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    
    document.getElementById('result-category').innerText = `Kategori: ${catTitles[currentCategory]}`;
    document.getElementById('final-score').innerText = `${score} / 100`;
    
    let comment = "";
    if (score === 100) comment = "Mükemmel! Tam bir dünya gezgini ve coğrafya profesörüsün! 🌟🧭";
    else if (score >= 75) comment = "Harika iş! Coğrafya bilgin oldukça yüksek seviyede. 🗺️✨";
    else if (score >= 50) comment = "Fena değil! Dünyayı biraz daha keşfederek kendini geliştirebilirsin. 🧭";
    else comment = "Bir dahaki sefere daha iyi olacaktır. Haritayı biraz daha incelemeye ne dersin? 🔍";
    
    document.getElementById('result-comment').innerText = comment;
}

function resetToMenu() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('category-screen').style.display = 'block';
    document.getElementById('main-title').style.display = 'block';
}
